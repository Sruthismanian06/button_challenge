<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Button Micro-Interactions</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Custom Tailwind Animation for Gentle Bounce */
    @keyframes pulseBounce {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.05) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .animate-pulseBounce {
      animation: pulseBounce 0.8s ease forwards;
    }
  </style>
</head>
<body class="bg-gradient-to-r from-slate-900 via-slate-950 to-slate-900 flex flex-col items-center justify-center min-h-screen p-6">

  <!-- Heading -->
  <div class="text-center mb-8">
    <h1 class="text-2xl md:text-3xl text-white font-bold mb-2">
      Which Button Feels More Alive?
    </h1>
    <h3 class="text-lg md:text-xl text-white font-semibold">
      Magnetic Glow vs Gentle Bounce
    </h3>
  </div>

  <!-- Buttons Container -->
  <div class="flex flex-col md:flex-row gap-10 items-center justify-center">
    <!-- Magnetic Glow Button -->
    <button id="btnMagnetic"
      class="px-8 py-3 text-lg font-semibold rounded-full
      bg-gradient-to-r from-cyan-400 to-purple-500 text-slate-900
      shadow-xl transition-transform duration-200 ease-out hover:shadow-cyan-400/60 hover:scale-105 relative">
      Magnetic Glow
    </button>

    <!-- Gentle Bounce Button -->
    <button id="btnBounce"
      class="px-8 py-3 text-lg font-semibold rounded-full
      bg-gradient-to-r from-pink-500 to-orange-400 text-white
      shadow-md transition-transform duration-300 ease-out hover:scale-105 hover:rotate-1 hover:shadow-pink-400/60 relative">
      Gentle Bounce
    </button>
  </div>


  <script>
    // Magnetic Glow Button
    const btnMagnetic = document.getElementById("btnMagnetic");
    btnMagnetic.addEventListener("mousemove", (e) => {
      const rect = btnMagnetic.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      btnMagnetic.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px) rotate(${x * 0.05}deg)`;
    });
    btnMagnetic.addEventListener("mouseleave", () => {
      btnMagnetic.style.transform = "translate(0,0) rotate(0deg)";
    });

    // Gentle Bounce Button
    const btnBounce = document.getElementById("btnBounce");
    btnBounce.addEventListener("mouseover", () => {
      btnBounce.classList.add("animate-pulseBounce");
    });
    btnBounce.addEventListener("animationend", () => {
      btnBounce.classList.remove("animate-pulseBounce");
    });
  </script>
</body>
</html>
