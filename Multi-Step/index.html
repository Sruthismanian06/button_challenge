<!DOCTYPE html>
<html>
<head>
<title>Multi-Step Button</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen text-white">

<div class="text-center">

<h1 class="text-2xl font-bold mb-6">Confirm Action Button ⚠️</h1>

<button id="btn"
class="px-8 py-3 bg-blue-500 rounded-lg font-semibold transition-all duration-300">
Delete File
</button>

<p id="status" class="mt-4 text-gray-400"></p>

</div>

<script>

const btn = document.getElementById("btn");
const status = document.getElementById("status");

let step = 0;

btn.addEventListener("click", ()=>{

step++;

if(step === 1){
btn.innerText = "Are you sure?";
btn.classList.remove("bg-blue-500");
btn.classList.add("bg-yellow-500");
status.innerText = "Click again to confirm";
}

else if(step === 2){
btn.innerText = "Confirm Delete";
btn.classList.remove("bg-yellow-500");
btn.classList.add("bg-red-500");
status.innerText = "Final warning!";
}

else if(step === 3){
btn.innerText = "Deleted ✔";
btn.classList.remove("bg-red-500");
btn.classList.add("bg-green-500");
status.innerText = "Action completed 🎉";
btn.disabled = true;
}

});

</script>

</body>
</html>
