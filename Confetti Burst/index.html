<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti Burst Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

   <style>
       @keyframes press{
       0%{transform:scale(1)}
       50%{transform:scale(.9)}
       100%{transform:scale(1)}
       }

     .clicked{
       animation: press .35s ease;
      }
</style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center text-white">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-xl text-center max-w-md border border-slate-700">
        <p class="text-sm text-gray-400 mb-2">Day 3 of My 7-Day Button Challenge</p>
        <h1 class="text-3xl font-bold mb-4">Confetti Burst Button 🎉</h1>
        <p class="text-gray-300 mb-6">A simple “Click Me” isn’t enough anymore.
            Sometimes a button should celebrate your action!
        </p>
        <button id="btn" onclick="celebrate(this)"
           class="bg-gradient-to-r from-pink-500 to-purple-500 px-7 py-3 rounded-xl font-semibold
           shadow-lg shadow-pink-500/40 hover:scale-110 transition duration-300">Celebrate 
        </button>
        <p id="message"class="mt-6 text-lg text-pink-400 opacity-0 transition">🎉 Yay! Time to celebrate!</p>
        <p class="mt-4 font-semibold text-gray-300">Celebrations: <span id="count">0</span></p>
    </div>
    
    <script>
    let count = 0;
    function celebrate(btn){
        confetti({
            particleCount:100,
            spread:80,
            origin:{y:0.6}
        });
        //open up msg 
        document.getElementById("message")
        message.classList.remove("opacity-0");
        //count celebration
        count++;
        document.getElementById("count").innerText = count;
        
        btn.classList.add("clicked");
        setTimeout(()=>btn.classList.remove("clicked"),350);
    }

</script>
</body>
</html>
